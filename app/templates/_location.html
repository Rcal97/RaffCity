<div style="width: 220px; background: #FFF; border-radius: 8px; padding: 15px; margin: 10px; display: inline-block; vertical-align: top; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
    <h4 style="color: #333; margin-bottom: 8px;">{{ location.name }}</h4>
    <p style="font-size: 13px; color: #666; margin-bottom: 5px;">{{ location.address }}, {{ location.city }}, {{ location.country }}</p>
    <p style="font-size: 13px; color: #666;">{{ location.body }}</p>
    <a href="/location/{{ location.name }}" style="font-size: 13px;">Learn More</a>
</div>
